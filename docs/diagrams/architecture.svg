<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    .box { fill:#f8fafc; stroke:#0f172a; stroke-width:1.5; rx:8; }
    .title { font: bold 14px/1.2 sans-serif; fill:#0f172a; }
    .label { font: 12px/1.2 sans-serif; fill:#0f172a; }
    .arrow { stroke:#0f172a; stroke-width:1.6; fill:none; marker-end:url(#a); }
  </style>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0f172a" />
    </marker>
  </defs>

  <!-- User & UI -->
  <rect x="20" y="30" width="140" height="60" class="box" />
  <text x="90" y="63" text-anchor="middle" class="title">User</text>

  <rect x="200" y="10" width="180" height="100" class="box" />
  <text x="290" y="45" text-anchor="middle" class="title">Streamlit UI / CLI</text>
  <text x="290" y="70" text-anchor="middle" class="label">app/  ·  scripts/</text>

  <!-- Orchestrator -->
  <rect x="420" y="10" width="190" height="100" class="box" />
  <text x="515" y="45" text-anchor="middle" class="title">Orchestrator</text>
  <text x="515" y="70" text-anchor="middle" class="label">routing · guardrails · synthesis</text>

  <!-- Agents cluster -->
  <rect x="20" y="150" width="860" height="220" rx="12" fill="#ffffff" stroke="#e6edf3" />
  <text x="60" y="170" class="label">Agents & Services</text>

  <rect x="80" y="190" width="180" height="70" class="box" />
  <text x="170" y="227" text-anchor="middle" class="title">PM Agent</text>
  <text x="170" y="245" text-anchor="middle" class="label">agents/pm_agent</text>

  <rect x="290" y="190" width="180" height="70" class="box" />
  <text x="380" y="227" text-anchor="middle" class="title">PM Skill Agent</text>
  <text x="380" y="245" text-anchor="middle" class="label">agents/pm_skill_agent</text>

  <rect x="500" y="190" width="180" height="70" class="box" />
  <text x="590" y="227" text-anchor="middle" class="title">Host Agent</text>
  <text x="590" y="245" text-anchor="middle" class="label">agents/host_agent</text>

  <!-- External systems -->
  <rect x="720" y="190" width="200" height="70" class="box" />
  <text x="820" y="208" text-anchor="middle" class="title">Azure DevOps</text>
  <text x="820" y="227" text-anchor="middle" class="label">WIQL · REST</text>

  <rect x="720" y="270" width="200" height="70" class="box" />
  <text x="820" y="290" text-anchor="middle" class="title">Vector DB</text>
  <text x="820" y="310" text-anchor="middle" class="label">embeddings · search</text>

  <rect x="500" y="270" width="200" height="70" class="box" />
  <text x="600" y="290" text-anchor="middle" class="title">Langfuse (optional)</text>
  <text x="600" y="310" text-anchor="middle" class="label">tracing & telemetry</text>

  <!-- Arrows -->
  <path d="M160 60 L200 60" class="arrow" />
  <path d="M380 60 L420 60" class="arrow" />
  <path d="M515 110 L515 190" class="arrow" />
  <path d="M270 245 L290 245" class="arrow" />
  <path d="M470 245 L500 245" class="arrow" />
  <path d="M680 225 L720 225" class="arrow" />
  <path d="M680 295 L720 295" class="arrow" />
  <path d="M690 245 L720 245" class="arrow" />

  <!-- Labels -->
  <text x="300" y="100" text-anchor="middle" class="label">routes user requests</text>
</svg>
